baseURL = 'https://zip.pet'
# languageCode = 'en-us'
defaultContentLanguage = 'es'
languageCode = 'es'
title = 'Informática'
theme = 'hugo-bearblog'
author = 'Isaac Bruno Quiroga'

# Generate a nice robots.txt for SEO
enableRobotsTXT = true
ignoreLogs = ['warning-goldmark-raw-html']

[params]
	hideMadeWithLine = true
	favicon = 'favicon.ico'
	dateFormat = '02/01'
	math = true
[markup]
	[markup.highlight]
		noClasses = false   # importante, para que use clases CSS en lugar de estilos inline
		lineNos = true
[markup.goldmark]
  [markup.goldmark.extensions]
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block = [['\[', '\]'], ['$$', '$$']]

[languages]
	[languages.es]
		languageName = "Español"
		weight = 1
